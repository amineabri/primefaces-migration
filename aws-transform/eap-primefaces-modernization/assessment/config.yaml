codeRepositoryPath: .
transformationName: eap-primefaces-modernization-assessment
buildCommand: ./gradlew clean build
additionalPlanContext: |
  Phase 1 assessment only. Do not modernize code, do not update build files, do not update Docker files, and do not migrate javax.* to jakarta.* in this phase.

  Inspect this repository and produce a modernization assessment report at:
  aws-transform/eap-primefaces-modernization/reports/assessment.md

  The report must estimate the migration from JBoss EAP 7.3.10.GA, Java EE 8, Java 8, and PrimeFaces 6.2.30 to JBoss EAP 8.1, Jakarta EE 10, Java 21, and PrimeFaces 15.0.16 with the Jakarta classifier.

  Include a staged estimate. Each stage must have its own low / expected / high estimate:
  - Stage 1: PrimeFaces 6.2.30 to PrimeFaces 7.0 on the current Java EE / EAP 7.3 stack.
  - Stage 2: PrimeFaces 7.0 to PrimeFaces 8.0 on the current Java EE / EAP 7.3 stack.
  - Stage 3: PrimeFaces 8.0 to PrimeFaces 10.0.0 on the current Java EE / EAP 7.3 stack. Note that there is no normal public PrimeFaces 9.x stage in this path.
  - Stage 4: PrimeFaces 10.0.0 to PrimeFaces 11.0.0 on the current Java EE / EAP 7.3 stack.
  - Stage 5: PrimeFaces 11.0.0 to PrimeFaces 12.0.0 on the current Java EE / EAP 7.3 stack.
  - Stage 6: PrimeFaces 12.0.0 to PrimeFaces 13.0.0 on the current Java EE / EAP 7.3 stack.
  - Stage 7: PrimeFaces 13.0.0 to PrimeFaces 14.0.0 on the current Java EE / EAP 7.3 stack.
  - Stage 8: PrimeFaces 14.0.0 to PrimeFaces 15.0.16 Jakarta plus JBoss EAP 8.1 / Jakarta EE 10 / Java 21 cutover.

  Include:
  - Inventory of affected files and dependencies.
  - Work breakdown by migration stage.
  - Low / expected / high AWS Transform agent-minute estimate per stage.
  - Low / expected / high estimated AWS Transform migration cost in USD per stage and total sequence.
  - Low / expected / high human engineering review and manual QA estimate per stage.
  - Cost formula: estimated AWS Transform cost = estimated migration agent minutes * current AWS Transform custom transformation agent-minute price.
  - Current pricing reference as of 2026-06-24: USD 0.035 per agent minute, based on https://aws.amazon.com/transform/pricing/.
  - Note that the current price must be checked at execution time from AWS pricing because pricing can change.
  - Risk rating and blockers.
  - Migration phase readiness checklist.

  The only file this phase may create or modify is the assessment report.
